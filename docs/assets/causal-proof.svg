<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ContainmentCI controlled containment proof</title>
  <desc id="desc">A subject credential changes from allowed to denied twice while an untouched control remains allowed, producing a pass within the containment SLO.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="1" stop-color="#102b46"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1090" cy="60" r="150" fill="#0ea5e9" opacity=".08"/>
  <circle cx="90" cy="430" r="170" fill="#22c55e" opacity=".06"/>

  <g transform="translate(54 45)">
    <path d="M34 0 64 12v26c0 24-14 42-30 50C18 80 4 62 4 38V12Z" fill="#38bdf8"/>
    <path d="m20 42 9 9 20-24" fill="none" stroke="#071426" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="35" fill="#f8fafc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="35" font-weight="800" letter-spacing=".5">ContainmentCI</text>
    <text x="84" y="66" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18">CONTAINMENT VERIFICATION AS CODE</text>
  </g>

  <text x="54" y="164" fill="#f8fafc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="36" font-weight="800">Prove access is gone.</text>
  <text x="54" y="196" fill="#a8bed2" font-family="ui-sans-serif,system-ui,sans-serif" font-size="19">Explicit denial + healthy control witness + measurable SLO</text>

  <g filter="url(#shadow)" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="16" font-weight="700">
    <rect x="54" y="236" width="190" height="64" rx="13" fill="#15324d" stroke="#38bdf8"/>
    <text x="149" y="274" fill="#7dd3fc" text-anchor="middle">SUBJECT: ALLOWED</text>
    <path d="M244 268h74" stroke="#64748b" stroke-width="3"/>
    <path d="m310 260 12 8-12 8" fill="none" stroke="#64748b" stroke-width="3"/>
    <rect x="322" y="236" width="150" height="64" rx="13" fill="#f59e0b"/>
    <text x="397" y="274" fill="#172033" text-anchor="middle">CONTAIN</text>
    <path d="M472 268h74" stroke="#64748b" stroke-width="3"/>
    <path d="m538 260 12 8-12 8" fill="none" stroke="#64748b" stroke-width="3"/>
    <rect x="550" y="236" width="190" height="64" rx="13" fill="#3a1722" stroke="#fb7185"/>
    <text x="645" y="274" fill="#fda4af" text-anchor="middle">DENIED 1/2</text>
    <path d="M740 268h54" stroke="#64748b" stroke-width="3"/>
    <path d="m786 260 12 8-12 8" fill="none" stroke="#64748b" stroke-width="3"/>
    <rect x="798" y="236" width="190" height="64" rx="13" fill="#3a1722" stroke="#fb7185"/>
    <text x="893" y="274" fill="#fda4af" text-anchor="middle">DENIED 2/2</text>
    <rect x="1014" y="236" width="132" height="64" rx="13" fill="#16a34a"/>
    <text x="1080" y="274" fill="#f0fdf4" text-anchor="middle">PASS</text>
  </g>

  <g font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15" font-weight="700">
    <path d="M149 330H1080" stroke="#22c55e" stroke-width="3" stroke-dasharray="7 7"/>
    <circle cx="149" cy="330" r="6" fill="#22c55e"/>
    <circle cx="1080" cy="330" r="6" fill="#22c55e"/>
    <text x="54" y="336" fill="#86efac">CONTROL</text>
    <text x="1080" y="358" fill="#86efac" text-anchor="middle">ALLOWED · SERVICE HEALTHY</text>
  </g>

  <text x="54" y="382" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15">429 · 5xx · timeout · unhealthy control → INDETERMINATE, never PASS</text>
</svg>
