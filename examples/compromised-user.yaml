name: simulated-compromised-user
description: Simulate a multi-provider containment check with one intentionally broken control.
identity: alex.synthetic@example.com
timeout_seconds: 3
poll_interval_seconds: 0.1
targets:
  - name: Microsoft Entra account
    provider: simulation
    resource: entra://tenant/users/alex.synthetic
    containment_delay_seconds: 0.1
    max_containment_seconds: 1
    control_required: true
  - name: AWS temporary credentials
    provider: simulation
    resource: aws://production/s3/customer-records
    containment_delay_seconds: 0.5
    max_containment_seconds: 1
    control_required: true
  - name: GitHub personal access token
    provider: simulation
    resource: github://acme/production
    containment_delay_seconds: 0
    max_containment_seconds: 1
    control_required: true
  - name: Slack mobile session
    provider: simulation
    resource: slack://acme/private-channel
    containment_supported: false
    max_containment_seconds: 1
    control_required: true
  - name: VPN certificate
    provider: simulation
    resource: vpn://corp/internal
    containment_delay_seconds: 0.2
    max_containment_seconds: 1
    control_required: true

