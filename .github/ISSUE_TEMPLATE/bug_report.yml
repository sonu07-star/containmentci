name: Bug report
description: Report a reproducible problem
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, tokens, private resource names, or sensitive evidence.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide a minimal sanitized scenario and commands.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ContainmentCI version
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, and provider.
    validations:
      required: true

